<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Ford Energy SiteNav Command v10</title>
<link rel="stylesheet" href="style.css?v=10.5.4"/>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.185.0/examples/jsm/"
  }
}
</script>
<style>
    #pedestrianNetworkMapperPanel, #mapLabelEditorPanel, #destinationAnchorEditorPanel { display: none !important; }
    body.editor-active #pedestrianNetworkMapperPanel, 
    body.editor-active #mapLabelEditorPanel, 
    body.editor-active #destinationAnchorEditorPanel { display: block !important; }
</style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <section class="brand-panel">
      <h1>SiteNav Command</h1>
      <p>Pedestrian Guidance System</p>
      <div class="system-status"><span class="online-dot"></span><b>Navigation Core Online</b></div>
    </section>
    <section class="control-section">
      <div class="mode-grid">
        <button class="mode active" data-mode="visitor"><span>👥</span>Visitor</button>
        <button class="mode" data-mode="employee"><span>🏭</span>Employee</button>
        <button class="mode" data-mode="contractor"><span>🦺</span>Contractor</button>
      </div>
      <label>Destination Search</label>
      <input id="searchBox" placeholder="Search..."/>
      <select id="startSelect"></select>
      <select id="endSelect"></select>
      <button id="routeBtn" class="primary-action">Generate Route</button>
    </section>
  </aside>
  <main class="workspace">
    <section class="map-shell">
      <div id="mapFrame" class="map-frame"><div id="mapStage"></div></div>
      <div id="threeFrame" class="three-frame" hidden>
        <div id="threeCanvas" class="three-canvas"></div>
        <div id="threeStatus" class="three-status"><span></span><span>Initializing...</span></div>
        <div id="pedestrianNetworkMapperPanel"></div>
        <div id="mapLabelEditorPanel"></div>
        <div id="destinationAnchorEditorPanel"></div>
      </div>
    </section>
  </main>
</div>
<script src="app.js?v=10.5.4"></script>
<script type="module" src="viewer3d.js?v=10.5.4"></script>
</body>
</html>
