<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Ford Energy SiteNav Command v10</title>
    <link rel="manifest" href="manifest.json"/>
    <link rel="icon" href="assets/icons/favicon.ico" sizes="any"/>
    <link rel="stylesheet" href="style.css?v=10.5.4"/>
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.185.0/examples/jsm/"
      }
    }
    </script>
    <style>
        /* Panel Styles */
        .layers-panel, .legend-panel { display: none; position: absolute; top: 70px; right: 20px; background: #061a33; border: 1px solid #1a3a5f; z-index: 99999 !important; padding: 15px; border-radius: 8px; color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        .legend-panel { right: 90px; }
        .layers-panel.show, .legend-panel.show { display: block !important; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a3a5f; margin-bottom: 10px; }
        
        /* 3D Core Enforcement */
        #mapFrame { display: none !important; }
        #threeFrame { display: block !important; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
    </style>
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <section class="brand-panel">
            <img class="brand-logo" src="assets/logos/ford-energy-white.png" alt="Ford Energy" onerror="this.src='assets/ford_energy_logo_white.png'"/>
            <div class="app-title"><h1>SiteNav Command</h1><p>Pedestrian Guidance System</p></div>
            <div class="system-status"><span class="online-dot"></span><div><b>Navigation Core Online</b><small>Ground Floor • v10 digital-twin</small></div></div>
        </section>

        <section class="control-section">
            <label>Navigation Mode</label>
            <div class="mode-grid">
                <button class="mode active" data-mode="visitor"><span>👥</span>Visitor</button>
                <button class="mode" data-mode="employee"><span>🏭</span>Employee</button>
                <button class="mode" data-mode="contractor"><span>🦺</span>Contractor</button>
                <button class="mode emergency" data-mode="emergency"><span>🚨</span>Emergency</button>
            </div>
            <label for="searchBox">Destination Search</label>
            <input id="searchBox" placeholder="Search..."/>
            <label for="destinationCategory">Destination Category</label>
            <select id="destinationCategory">
				<option value="all">All Categories</option>
				<option value="visitor">Visitor</option>
				<option value="production">Production & Departments</option>
				<option value="security">Security & Entrances</option>
				<option value="amenity">Amenities</option>
				<option value="emergency">Emergency</option>
			</select>
			<div id="searchResults" class="search-results-box"></div>>
            <label for="startSelect">Start</label><select id="startSelect"></select>
            <label for="endSelect">Destination</label><select id="endSelect"></select>
            <button id="routeBtn" class="primary-action">Generate Route</button>
        </section>

        <section class="quick-routes"><div class="section-heading">Quick Routes</div><div id="quickRoutes"></div></section>
        <section class="route-status"><div class="route-title"><span>Route Status</span><b id="routeStatus">3D ROUTE</b></div></section>
        <footer class="version-footer">PGS v10.0.0 Alpha</footer>
    </aside>

    <main class="workspace">
        <header class="topbar">
            <h2>BlueOval Glendale • Ground Floor</h2>
            <nav class="top-actions">
                <button id="searchFocus">⌕ Search</button>
                <button id="legendOpen">Legend</button>
                <button id="layersOpen">Layers</button>
                <button id="resetView">Reset</button>
                <button id="fitRoute" class="fit-button">Fit Route</button>
            </nav>
        </header>

        <section class="map-shell">
            <!-- Layers Panel -->
            <div id="layersPanel" class="layers-panel">
                <div class="panel-header"><h3>Map Layers</h3><button id="layersClose">×</button></div>
                <div>
                    <label><input type="checkbox" data-3d-layer="roof"> Roof Level</label><br>
                    <label><input type="checkbox" data-3d-layer="ground" checked> Ground Floor</label><br>
                    <label><input type="checkbox" data-semantic-label="room" checked> Rooms & Offices</label>
                </div>
            </div>

            <!-- Legend Panel -->
			<div id="legendPanel" class="legend-panel">
				<div class="panel-header"><h3>Legend</h3><button id="legendClose">×</button></div>
				<div id="legendContent">
					<p><span style="color: #4da8da; font-weight: bold;">━━</span> Primary Route</p>
					<p><span style="color: #ff4444; font-weight: bold;">━━</span> Emergency Route</p>
					<p><span style="color: #00ff88; font-size: 1.2em;">●</span> Approved Route</p>
					<p><span style="color: #ffaa00; font-size: 1.2em;">●</span> Tracking Point</p>
				</div>
			</div>

            <!-- 3D Map Frame -->
            <div id="threeFrame" class="three-frame">
                <div id="threeCanvas" class="three-canvas"></div>
            </div>
        </section>
    </main>
</div>

<script src="app.js?v=10.5.5"></script>
<script type="module" src="viewer3d.js?v=10.5.7"></script>

<script>
    // Logic to handle panel clicks without conflict
    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("layersOpen").addEventListener("click", () => document.getElementById("layersPanel").classList.add("show"));
        document.getElementById("layersClose").addEventListener("click", () => document.getElementById("layersPanel").classList.remove("show"));
        document.getElementById("legendOpen").addEventListener("click", () => document.getElementById("legendPanel").classList.add("show"));
        document.getElementById("legendClose").addEventListener("click", () => document.getElementById("legendPanel").classList.remove("show"));
    });
</script>
</body>
</html>
