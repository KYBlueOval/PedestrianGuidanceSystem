<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Ford Energy SiteNav Command v10</title>
    <link rel="stylesheet" href="style.css?v=10.5.4"/>
    <style>
        /* Panel Styles */
        .layers-panel, .legend-panel { display: none; position: absolute; top: 70px; right: 20px; background: #061a33; border: 1px solid #1a3a5f; z-index: 9999; padding: 15px; border-radius: 8px; color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        .layers-panel.show, .legend-panel.show { display: block; }
        .panel-header { display: flex; justify-content: space-between; border-bottom: 1px solid #1a3a5f; margin-bottom: 10px; }
        /* Map Visibility */
        #mapFrame { display: block; }
        #threeFrame { display: none; }
        .three-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; }
    </style>
</head>
<body>
    <!-- [Keep your existing body content up to map-shell, then replace the content below] -->
    <section class="map-shell">
        <!-- Panels -->
        <div id="layersPanel" class="layers-panel">
            <div class="panel-header"><h3>Map Layers</h3><button onclick="document.getElementById('layersPanel').classList.remove('show')">×</button></div>
            <div><label><input type="checkbox" data-3d-layer="ground" checked> Ground Floor</label><br>
                 <label><input type="checkbox" data-3d-layer="site" checked> Site Exterior</label></div>
        </div>
        <div id="legendPanel" class="legend-panel">
            <div class="panel-header"><h3>Legend</h3><button onclick="document.getElementById('legendPanel').classList.remove('show')">×</button></div>
            <p>━ Primary Route</p>
        </div>

        <div id="mapFrame" class="map-frame">
            <div id="mapStage"><img id="plantMap" src="assets/map-full.png"/></div>
        </div>

        <div id="threeFrame" class="three-frame">
            <div id="threeCanvas" style="width:100%; height:100%;"></div>
        </div>
    </section>

    <script src="app.js?v=10.5.4"></script>
    <script type="module" src="viewer3d.js?v=10.5.4"></script>
    
    <script>
        // FORCED UI BINDINGS
        document.getElementById('layersOpen').onclick = () => document.getElementById('layersPanel').classList.toggle('show');
        document.getElementById('legendOpen').onclick = () => document.getElementById('legendPanel').classList.toggle('show');
        
        // FORCED 3D SWITCH
        document.getElementById('view3DBtn').onclick = () => {
            document.getElementById('mapFrame').style.display = 'none';
            document.getElementById('threeFrame').style.display = 'block';
            document.getElementById('threeFrame').hidden = false;
            if(window.pgs3d) window.pgs3d.show();
        };
        document.getElementById('view2DBtn').onclick = () => {
            document.getElementById('mapFrame').style.display = 'block';
            document.getElementById('threeFrame').style.display = 'none';
            if(window.pgs3d) window.pgs3d.hide();
        };
    </script>
</body>
</html>
